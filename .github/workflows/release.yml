name: Release Build & Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & Publish Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Code kompilieren
        run: npm run build

      - name: Anwendung kompilieren & Veröffentlichen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npx electron-builder --win --publish always
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac --publish always
          else
            npx electron-builder --linux --publish always
          fi
        shell: bash

  publish-release:
    name: Release veröffentlichen
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Release editieren und veröffentlichen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          title="Omega Wave Editor v$version"
          notes="Omega Wave Editor v$version Release"
          echo "Publishing release $tag with title '$title'..."
          gh release edit "$tag" --draft=false --title "$title" --notes "$notes" --latest
