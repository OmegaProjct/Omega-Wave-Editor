services:
  telemetry-server:
    image: node:18-alpine
    container_name: omega-telemetry-server
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3019:3000"
    volumes:
      - .:/app
      - telemetry-data:/app/data
    command: sh -c "npm install && npm start"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ADMIN_PASSWORD=31090

volumes:
  telemetry-data:
